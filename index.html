<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>

    <!-- Link to style.css -->
    <link rel="stylesheet" href="style.css">

    <!-- Link for favicon -->
    <link rel="icon" type="image/png" href="./img/header_fotogram_logo.png">
</head>

<body onload="init()">

    <!-- Header -->
    <header>
        <div class="header-fotogram-logo">
            <a href="index.html" class="header-fotogram-logo" aria-label="Startseite">
                <img src="./img/header_fotogram_logo.png" alt="Picture Fotogram logo">
                <img src="./img/header_fotogram_name.png" alt="Picture Fotogram name">
            </a>
        </div>
    </header>

    <!-- Main -->
    <main>
        <h1>Your personal photo album</h1>

        <!-- Picture gallery -->
        <section class="gallery" id="picture-gallery" role="group" aria-label="Bildergalerie"></section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-da-logo">
            <a href="https://developerakademie.com/" target="_blank" rel="noopener noreferrer" aria-label="Mit Klick auf diesen Link besuchen Sie die Seite der Developer Akademie (öffnet in neuem Tab)"><img src="./img/footer_da_logo.png" alt="Picture DA logo"></a>
            <p class="footer-da-text">&copy; 2023 Developer Akademie GmbH</p>
        </div>
    </footer>

     <!-- Modal dialog box -->
    <dialog id="dialog-box">
        <header class="dialog-header">
            <h2 id="dialog-title"></h2>
            <button class="close-button" id="close-button-dialog-box" onclick="closeDialog()"" aria-label="Schließen"><img src="./img/dialog_close_button_default.png" alt="Close button" aria-hidden="true"></button>
        </header>
        <main class="dialog-main">
            <img src="" alt="Picture full view" id="picture-full-view">
        </main>
        <footer class="dialog-footer">
            <button class="arrow-button-left" id="left-arrow" onclick="changePicture(-1)" aria-label="Vorheriges Bild"><img src="./img/dialog_next_button_default.png" alt="Next button left" aria-hidden="true"></button>
            <span class="counter-text" id="counter"></span>
            <button class="arrow-button-right" id="right-arrow" onclick="changePicture(1)" aria-label="Nächstes Bild"><img src="./img/dialog_next_button_default.png" alt="Next button right" aria-hidden="true"></button>
        </footer>
    </dialog>

    <!-- Link to script.js -->
    <script src="script.js"></script>

</body>
</html>
