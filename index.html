<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>

    <!-- Link to style.css -->
    <link rel="stylesheet" href="style.css">

    <!-- Link for favicon -->
    <link rel="icon" type="image/png" href="./img/header_fotogram_logo.png">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="header-fotogram-logo">
            <a href="index.html" class="header-fotogram-logo">
                <img src="./img/header_fotogram_logo.png" alt="Picture Fotogram logo">
                <img src="./img/header_fotogram_name.png" alt="Picture Fotogram name">
            </a>
        </div>
    </header>

    <!-- Main -->
    <main>
        <h1>Your personal photo album</h1>

        <!-- Picture gallery -->
        <div class="gallery">
            <figure>
                <img src="./pictures/alaska_winter_lake.jpg" alt="Picture Alaska winter lake" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/comic_city_view.jpg" alt="Picture comic city view" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/dark_clouds_view.png" alt="Picture dark clouds view" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/bird_on_tree.jpg" alt="Picture bird on tree" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/storm_clouds_view.jpg" alt="Picture storm clouds view" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/winter_lake.jpg" alt="Picture winter lake" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/duck.jpg" alt="Picture duck" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/sea_view.jpg" alt="Picture sea view" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/bird_on_tree.jpg" alt="Picture bird on tree" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/tigers.jpg" alt="Picture tigers" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/mountain.jpg" alt="Picture mountain" class="gallery-item">
            </figure>
            <figure>
                <img src="./pictures/winter_tree.jpg" alt="Picture winter tree" class="gallery-item">
            </figure>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-da-logo">
            <a href="https://developerakademie.com/"><img src="./img/footer_da_logo.png" alt="Picture DA logo"></a>
            <p class="footer-da-text">&copy; 2023 Developer Akademie GmbH</p>
        </div>
    </footer>

     <!-- Modal dialog box -->
    <dialog id="dialog-box">
        <header class="dialog-header">
            <h2 id="dialog-title"></h2>
            <button class="close-button" id="close-button-dialog-box"><img src="./img/dialog_close_button_default.png" alt="Close button"></button>
        </header>
        <main class="dialog-main">
            <img src="" alt="Picture full view" id="picture-full-view">
        </main>
        <footer class="dialog-footer">
            <button class="arrow-button-left" id="left-arrow"><img src="./img/dialog_next_button_default.png" alt="Next button left"></button>
            <span class="counter-text" id="counter"></span>
            <button class="arrow-button-right" id="right-arrow"><img src="./img/dialog_next_button_default.png" alt="Next button right"></button>
        </footer>
    </dialog>

    <!-- Link to script.js -->
    <script src="script.js"></script>

</body>
</html>
